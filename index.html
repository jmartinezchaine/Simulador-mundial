<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .btn-active {
            border-bottom: 3px solid #3b82f6;
            color: #3b82f6;
            font-weight: bold;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-800 antialiased pb-20">

    <header class="bg-blue-900 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-base font-bold mx-auto">Simulador Mundial 2026</h1>
    </header>

    <nav class="bg-white shadow sticky top-[55px] z-40 overflow-x-auto whitespace-nowrap flex scrollbar-hide">
        <button onclick="cambiarTab('fixture')" id="tab-fixture" class="p-3 text-sm btn-active">Fixture</button>
        <button onclick="cambiarTab('grupos')" id="tab-grupos" class="p-3 text-sm text-gray-500">Grupos</button>
        <button onclick="cambiarTab('terceros')" id="tab-terceros" class="p-3 text-sm text-gray-500">Terceros</button>
        <button onclick="cambiarTab('cruces')" id="tab-cruces" class="p-3 text-sm text-gray-500">Cruces
            (16avos)</button>
        <button onclick="cambiarTab('general')" id="tab-general" class="p-3 text-sm text-gray-500">General</button>
    </nav>

    <main class="p-2 max-w-md mx-auto mt-2">

        <section id="content-fixture" class="tab-content active bg-white rounded shadow p-2">
            <div class="flex justify-between items-center border-b pb-2 mb-2">
                <div>
                    <h2 class="font-bold text-gray-700">Cargar Resultados</h2>
                    <p class="text-[11px] text-gray-500">Define qué resultados son reales o simulados.</p>
                </div>
                <div class="flex flex-col gap-1 items-end">
                    <div class="flex gap-1">
                        <button onclick="irAPartidosDeHoy()"
                            class="bg-blue-100 hover:bg-blue-200 text-blue-700 text-[11px] font-semibold px-2 py-1 rounded transition flex items-center gap-1">
                            📅 Hoy
                        </button>
                        <button onclick="limpiarSimulaciones()"
                            class="bg-orange-100 hover:bg-orange-200 text-orange-700 text-[11px] font-semibold px-2 py-1 rounded transition">
                            Limpiar Sim.
                        </button>
                        <button onclick="reiniciarTodo()"
                            class="bg-red-100 hover:bg-red-200 text-red-700 text-[11px] font-semibold px-2 py-1 rounded transition">
                            Reset Total
                        </button>
                    </div>
                    <div class="flex gap-1 mt-1">
                        <button onclick="exportarDatos()"
                            class="bg-gray-100 hover:bg-gray-200 text-gray-700 text-[10px] font-medium px-2 py-0.5 rounded transition flex items-center gap-1">
                            📤 Exportar
                        </button>
                        <button onclick="document.getElementById('input-importar').click()"
                            class="bg-gray-100 hover:bg-gray-200 text-gray-700 text-[10px] font-medium px-2 py-0.5 rounded transition flex items-center gap-1">
                            📥 Importar
                        </button>
                        <input type="file" id="input-importar" accept=".json" onchange="importarDatos(event)"
                            class="hidden">
                    </div>
                </div>
            </div>
            <div class="mb-2.5 relative">
                <input type="text" id="filtro-equipo" oninput="renderFixture()"
                    placeholder="🔍 Buscar partidos por equipo..."
                    class="w-full pl-8 pr-3 py-1.5 border border-gray-200 rounded-lg text-xs outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all bg-gray-50/50">
            </div>
            <div id="contenedor-fixture" class="space-y-4">
            </div>
        </section>

        <section id="content-grupos" class="tab-content">
            <h2 class="font-bold text-gray-700 mb-2 pl-1">Posiciones por Grupo</h2>
            <div id="contenedor-grupos" class="space-y-4"></div>
        </section>

        <section id="content-terceros" class="tab-content bg-white rounded shadow p-2">
            <h2 class="font-bold text-gray-700 mb-1 border-b pb-1">Tabla de Terceros</h2>
            <p class="text-[11px] text-gray-500 mb-2">Clasifican los mejores 8 terceros a los 16avos de final.</p>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-50 text-gray-600">
                        <tr>
                            <th class="p-1">Pos</th>
                            <th class="p-1">Equipo</th>
                            <th class="p-1 text-center">PTS</th>
                            <th class="p-1 text-center">DG</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-terceros-body" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </section>

        <section id="content-cruces" class="tab-content bg-white rounded shadow p-2">
            <h2 class="font-bold text-gray-700 mb-2 border-b pb-1">Fase Eliminatoria</h2>
            <div class="flex gap-2 mb-3">
                <button id="subtab-16avos" onclick="cambiarSubTab('16avos')" class="flex-1 py-1.5 px-3 rounded-lg text-xs font-semibold border transition-all duration-200 bg-blue-900 text-white border-blue-900">16avos de Final</button>
                <button id="subtab-8vos" onclick="cambiarSubTab('8vos')" class="flex-1 py-1.5 px-3 rounded-lg text-xs font-semibold border transition-all duration-200 bg-white text-gray-700 border-gray-200">Octavos de Final (8vos)</button>
            </div>
            <div id="contenedor-cruces" class="space-y-2">
            </div>
        </section>

        <section id="content-general" class="tab-content bg-white rounded shadow p-2">
            <h2 class="font-bold text-gray-700 mb-2 border-b pb-1">Tabla General</h2>
            <table class="w-full text-sm text-left">
                <thead class="bg-gray-50 text-gray-600">
                    <tr>
                        <th class="p-1">Pos</th>
                        <th class="p-1">Equipo</th>
                        <th class="p-1 text-center">PTS</th>
                        <th class="p-1 text-center">DG</th>
                    </tr>
                </thead>
                <tbody id="tabla-general-body" class="divide-y divide-gray-200"></tbody>
            </table>
        </section>

    </main>

        // Inicializar datos desde LocalStorage o usar la Base
        function inicializarDatos() {
            equipos = JSON.parse(JSON.stringify(equiposBase));
            const guardado = localStorage.getItem('simulador_2026_fixture');
            let usarBase = true;
            let fixtureCargado = null;

            try {
                ganadores16avos = JSON.parse(localStorage.getItem('simulador_2026_ganadores16avos') || '{}');
                ganadores8vos = JSON.parse(localStorage.getItem('simulador_2026_ganadores8vos') || '{}');
            } catch (e) {
                ganadores16avos = {};
                ganadores8vos = {};
            }

            if (guardado) {
                try {
                    const parsed = JSON.parse(guardado);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        // Verificar que sea de la versión actual (al menos un equipo del guardado existe)
                        const deVersionActual = parsed.some(p => equipos.some(e => e.id === p.t1));
                        if (deVersionActual) {
                            fixtureCargado = parsed;
                            usarBase = false;
                        }
                    }
                } catch (e) { }
            }

            if (usarBase) {
                fixture = JSON.parse(JSON.stringify(fixtureBase));
                localStorage.setItem('simulador_2026_fixture', JSON.stringify(fixture));
            } else {
                // Hacer un MERGE inteligente con la base oficial para no perder los datos del usuario
                fixture = JSON.parse(JSON.stringify(fixtureBase));
                fixture.forEach(partidoOficial => {
                    const partidoGuardado = fixtureCargado.find(p => 
                        (p.t1 === partidoOficial.t1 && p.t2 === partidoOficial.t2) ||
                        (p.t1 === partidoOficial.t2 && p.t2 === partidoOficial.t1)
                    );
                    if (partidoGuardado) {
                        if (partidoGuardado.t1 === partidoOficial.t1) {
                            partidoOficial.g1 = partidoGuardado.g1;
                            partidoOficial.g2 = partidoGuardado.g2;
                        } else {
                            partidoOficial.g1 = partidoGuardado.g2;
                            partidoOficial.g2 = partidoGuardado.g1;
                        }
                        partidoOficial.esReal = partidoGuardado.esReal;
                    }
                });
                // Guardar la versión reparada y fusionada
                guardarDatos();
            }
            calcularPosiciones();
        }

        // Importar datos desde un archivo JSON
        function importarDatos(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    // Validar si el archivo importado es completamente compatible con el fixture actual
                    if (Array.isArray(parsed) && parsed.length === fixtureBase.length) {
                        const todosExisten = parsed.every(p =>
                            equipos.some(e => e.id === p.t1) &&
                            equipos.some(e => e.id === p.t2)
                        );
                        if (todosExisten) {
                            fixture = parsed;
                            guardarDatos();
                            calcularPosiciones();
                            showToast("Datos importados con éxito", "success");
                        } else {
                            showToast("El archivo contiene selecciones incompatibles", "warning");
                        }
                    } else {
                        showToast("Formato de archivo inválido", "warning");
                    }
                } catch (error) {
                    showToast("Error al procesar el archivo JSON", "warning");
                }
                // Limpiar el valor del input para poder importar el mismo archivo de nuevo si se desea
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        // --- 2. LÓGICA DE SIMULACIÓN Y CÁLCULO ---
        function calcularPosiciones() {
            estadoTorneo = equipos.map(eq => ({
                ...eq, pts: 0, pj: 0, gf: 0, gc: 0, dg: 0, posGrupo: 0
            }));

            fixture.forEach(partido => {
                if (partido.g1 !== null && partido.g2 !== null) {
                    let eq1 = estadoTorneo.find(e => e.id === partido.t1);
                    let eq2 = estadoTorneo.find(e => e.id === partido.t2);

                    let g1 = parseInt(partido.g1);
                    let g2 = parseInt(partido.g2);

                    if (eq1 && eq2) {
                        eq1.pj++; eq2.pj++;
                        eq1.gf += g1; eq2.gf += g2;
                        eq1.gc += g2; eq2.gc += g1;
                        eq1.dg = eq1.gf - eq1.gc;
                        eq2.dg = eq2.gf - eq2.gc;

                        if (g1 > g2) { eq1.pts += 3; }
                        else if (g1 < g2) { eq2.pts += 3; }
                        else { eq1.pts += 1; eq2.pts += 1; }
                    }
                }
            });

            const grupos = [...new Set(estadoTorneo.map(e => e.grupo))];
            grupos.forEach(letra => {
                let eqGrupo = estadoTorneo.filter(e => e.grupo === letra);
                eqGrupo.sort((a, b) => b.pts - a.pts || b.dg - a.dg || b.gf - a.gf);
                eqGrupo.forEach((eq, index) => {
                    let ref = estadoTorneo.find(e => e.id === eq.id);
                    ref.posGrupo = index + 1;
                });
            });

            renderizarTodo();
        }

        function actualizarGol(partidoId, equipoNum, valor) {
            let partido = fixture.find(p => p.id === partidoId);
            let goles = valor === "" ? null : parseInt(valor);
            if (equipoNum === 1) partido.g1 = goles;
            else partido.g2 = goles;

            guardarDatos();
            calcularPosiciones();
        }

            let partido = fixture.find(p => p.id === partidoId);
            partido.esReal = !partido.esReal;

        }

        function obtenerUYT(fechaOriginal, horaOriginal, estadio) {
            const mesesCompletos = { "Ene": 0, "Feb": 1, "Mar": 2, "Abr": 3, "May": 4, "Jun": 5, "Jul": 6, "Ago": 7, "Sep": 8, "Oct": 9, "Nov": 10, "Dic": 11 };
            const nombresMeses = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
            
            const [hora, min] = horaOriginal.split(':').map(Number);
            const dia = parseInt(fechaOriginal.split(' ')[0]);
            const mesStr = fechaOriginal.split(' ')[1];
            const mes = mesesCompletos[mesStr];
            
            // Determinar offset del estadio en base a su nombre (en horario de verano / DST)
            let offset = -4; // Default: EDT (Eastern Daylight Time, UTC-4)
            if (estadio.includes("Azteca") || estadio.includes("Akron") || estadio.includes("BBVA") || estadio.includes("Houston") || estadio.includes("Arrowhead") || estadio.includes("Dallas")) {
                offset = -5; // CDT (Central Daylight Time, UTC-5)
            } else if (estadio.includes("Vancouver") || estadio.includes("SoFi") || estadio.includes("Levi's") || estadio.includes("Seattle")) {
                offset = -7; // PDT (Pacific Daylight Time, UTC-7)
            }
            
            // Diferencia para llegar a UYT (-3)
            const diffHoras = -3 - offset;
            
            // Crear objeto Date en UTC (usando año 2026) y sumar diferencia de horas
            const date = new Date(Date.UTC(2026, mes, dia, hora, min));
            date.setUTCHours(date.getUTCHours() + diffHoras);
            
            const nuevoDia = date.getUTCDate();
            const nuevoMes = nombresMeses[date.getUTCMonth()];
            const nuevaHora = String(date.getUTCHours()).padStart(2, '0') + ':' + String(date.getUTCMinutes()).padStart(2, '0');
            
            return {
                fecha: `${nuevoDia} ${nuevoMes}`,
                hora: nuevaHora
            };
        }

        function renderFixture() {
            // Guardar el ID del elemento con foco antes de vaciar el contenedor
            const focusedId = document.activeElement ? document.activeElement.id : null;

            const cont = document.getElementById('contenedor-fixture');
            cont.innerHTML = '';

            const filtroEquipo = document.getElementById('filtro-equipo')?.value.toLowerCase() || '';

            const mesesCompletos = { "Ene": 1, "Feb": 2, "Mar": 3, "Abr": 4, "May": 5, "Jun": 6, "Jul": 7, "Ago": 8, "Sep": 9, "Oct": 10, "Nov": 11, "Dic": 12 };

            // Precalcular el horario UYT para cada partido para ordenar y renderizar correctamente
            const fixtureConUYT = fixture.map(p => {
                const uyt = obtenerUYT(p.fecha, p.hora, p.estadio);
                return {
                    ...p,
                    fechaUyt: uyt.fecha,
                    horaUyt: uyt.hora
                };
            });

            const fixtureOrdenado = fixtureConUYT.sort((a, b) => {
                const diaA = parseInt(a.fechaUyt.split(' ')[0]);
                const mesA = mesesCompletos[a.fechaUyt.split(' ')[1]];
                const [hA, mA] = a.horaUyt.split(':').map(Number);

                const diaB = parseInt(b.fechaUyt.split(' ')[0]);
                const mesB = mesesCompletos[b.fechaUyt.split(' ')[1]];
                const [hB, mB] = b.horaUyt.split(':').map(Number);

                const valA = mesA * 1000000 + diaA * 10000 + hA * 100 + mA;
                const valB = mesB * 1000000 + diaB * 10000 + hB * 100 + mB;

                return valA - valB;
            });

            let ultimaFecha = '';

            fixtureOrdenado.forEach(p => {
                let eq1 = equipos.find(e => e.id === p.t1);
                let eq2 = equipos.find(e => e.id === p.t2);
                let n1 = eq1 ? eq1.nombre : p.t1;
                let n2 = eq2 ? eq2.nombre : p.t2;

                if (filtroEquipo && !n1.toLowerCase().includes(filtroEquipo) && !n2.toLowerCase().includes(filtroEquipo)) {
                    return;
                }

                let v1 = p.g1 !== null ? p.g1 : '';
                let v2 = p.g2 !== null ? p.g2 : '';

                const bEstiloReal = p.esReal
                    ? 'border-green-400 bg-green-50/50'
                    : 'border-gray-200 bg-gray-50';

                const btnEstiloReal = p.esReal
                    ? 'bg-green-600 text-white'
                    : 'bg-gray-200 text-gray-600 hover:bg-gray-300';

                if (p.fechaUyt !== ultimaFecha && !filtroEquipo) {
                    ultimaFecha = p.fechaUyt;
                    cont.innerHTML += `
                        <div class="text-xs font-bold text-gray-500 bg-gray-100/90 sticky top-[95px] py-1 px-2 rounded-md shadow-sm border border-gray-200/50 backdrop-blur-sm z-30 mt-4 mb-2 flex justify-between items-center">
                            <span>📅 ${p.fechaUyt}</span>
                            <span class="text-[9px] font-normal uppercase tracking-wider text-gray-400">Fase de Grupos</span>
                        </div>
                    `;
                }

                cont.innerHTML += `
                    <div data-id="${p.id}" data-fecha="${p.fechaUyt}" class="p-2 rounded border flex flex-col shadow-sm transition-all ${bEstiloReal}">
                        <div class="flex justify-between items-center text-[10px] text-gray-500 mb-1.5 px-1 border-b pb-1 border-gray-100">
                            <div>📅 ${p.fechaUyt} - ⏰ ${p.horaUyt} UYT</div>
                            <div class="truncate max-w-[150px]">🏟️ ${p.estadio}</div>
                            <button onclick="alternarTipoResultado(${p.id})" class="text-[9px] px-1.5 py-0.5 rounded font-bold uppercase tracking-wider transition ${btnEstiloReal}">
                                ${p.esReal ? '🔒 Real' : '🧪 Sim'}
                            </button>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="text-right flex-1 text-xs font-semibold mr-2 truncate">
                                ${n1} <span class="text-[9px] text-gray-400 font-normal">(${p.grp})</span>
                            </div>
                            <div class="flex gap-1 items-center font-bold">
                                <input type="number" id="input-${p.id}-1" min="0" max="20" value="${v1}" oninput="actualizarGol(${p.id}, 1, this.value)" class="w-9 h-8 text-center border border-gray-300 rounded focus:border-blue-500 outline-none text-base bg-white">

                            </div>
                            <div class="text-left flex-1 text-xs font-semibold ml-2 truncate">
                                ${n2}
                            </div>
                        </div>
                    </div>
                `;
            });

            if (cont.innerHTML === '') {
                cont.innerHTML = `
                    <div class="text-center py-8 text-gray-400 text-xs">
                        No se encontraron partidos para "${filtroEquipo}".
                    </div>
                `;

            // Restaurar el foco si correspondía a uno de nuestros inputs
            if (focusedId && focusedId.startsWith('input-')) {
                const el = document.getElementById(focusedId);
                if (el) {
                    el.focus();
                }
            }
        }

            const cont = document.getElementById('contenedor-cruces');

            const getEq = (pos, grp) => estadoTorneo.find(e => e.posGrupo === pos && e.grupo === grp) || { nombre: `Por definir (${pos}${grp})` };
            let terceros = estadoTorneo.filter(e => e.posGrupo === 3).sort((a, b) => b.pts - a.pts || b.dg - a.dg || b.gf - a.gf);
            const get3ro = (idx) => terceros[idx] || { nombre: `Mejor 3º (${idx + 1})` };

            // Estructura oficial del bracket de los 16avos de final (FIFA World Cup 2026)
            const llaves = [
                { t1: getEq(2, 'A'), t1Label: '2º A', t2: getEq(2, 'B'), t2Label: '2º B', desc: 'Match 73 (Llave 1)' },
                { t1: getEq(1, 'E'), t1Label: '1º E', t2: get3ro(0), t2Label: '3º', desc: 'Match 74 (Llave 2)' },
                { t1: getEq(1, 'F'), t1Label: '1º F', t2: getEq(2, 'C'), t2Label: '2º C', desc: 'Match 75 (Llave 3)' },
                { t1: getEq(1, 'C'), t1Label: '1º C', t2: getEq(2, 'F'), t2Label: '2º F', desc: 'Match 76 (Llave 4)' },
                { t1: getEq(1, 'I'), t1Label: '1º I', t2: get3ro(1), t2Label: '3º', desc: 'Match 77 (Llave 5)' },
                { t1: getEq(2, 'E'), t1Label: '2º E', t2: getEq(2, 'I'), t2Label: '2º I', desc: 'Match 78 (Llave 6)' },
                { t1: getEq(1, 'A'), t1Label: '1º A', t2: get3ro(2), t2Label: '3º', desc: 'Match 79 (Llave 7)' },
                { t1: getEq(1, 'L'), t1Label: '1º L', t2: get3ro(3), t2Label: '3º', desc: 'Match 80 (Llave 8)' },
                { t1: getEq(1, 'D'), t1Label: '1º D', t2: get3ro(4), t2Label: '3º', desc: 'Match 81 (Llave 9)' },
                { t1: getEq(1, 'G'), t1Label: '1º G', t2: get3ro(5), t2Label: '3º', desc: 'Match 82 (Llave 10)' },
                { t1: getEq(2, 'K'), t1Label: '2º K', t2: getEq(2, 'L'), t2Label: '2º L', desc: 'Match 83 (Llave 11)' },
                { t1: getEq(1, 'H'), t1Label: '1º H', t2: getEq(2, 'J'), t2Label: '2º J', desc: 'Match 84 (Llave 12)' },
                { t1: getEq(1, 'B'), t1Label: '1º B', t2: get3ro(6), t2Label: '3º', desc: 'Match 85 (Llave 13)' },
                { t1: getEq(1, 'J'), t1Label: '1º J', t2: getEq(2, 'H'), t2Label: '2º H', desc: 'Match 86 (Llave 14)' },
                { t1: getEq(1, 'K'), t1Label: '1º K', t2: get3ro(7), t2Label: '3º', desc: 'Match 87 (Llave 15)' },
                { t1: getEq(2, 'D'), t1Label: '2º D', t2: getEq(2, 'G'), t2Label: '2º G', desc: 'Match 88 (Llave 16)' }
            ];

            // Limpieza preventiva si cambiaron posiciones de fase de grupos
            for (let idx = 0; idx < llaves.length; idx++) {
                const llave = llaves[idx];
                const ganadorSelected = ganadores16avos[idx];
                if (ganadorSelected && ganadorSelected !== llave.t1.id && ganadorSelected !== llave.t2.id) {
                    delete ganadores16avos[idx];
                }
            }

            // Del mismo modo, limpiar ganadores de octavos si el ganador de 16avos cambió
            const getWinner16avo = (llaveNum) => {
                const winnerId = ganadores16avos[llaveNum];
                if (!winnerId) return null;
                return estadoTorneo.find(e => e.id === winnerId) || { id: winnerId, nombre: winnerId };
            };

            const octavos = [
                { t1: getWinner16avo(1) || { nombre: 'Ganador Llave 2 (Match 74)' }, t2: getWinner16avo(4) || { nombre: 'Ganador Llave 5 (Match 77)' }, desc: 'Match 89 (8vo 1)' },
                { t1: getWinner16avo(0) || { nombre: 'Ganador Llave 1 (Match 73)' }, t2: getWinner16avo(2) || { nombre: 'Ganador Llave 3 (Match 75)' }, desc: 'Match 90 (8vo 2)' },
                { t1: getWinner16avo(3) || { nombre: 'Ganador Llave 4 (Match 76)' }, t2: getWinner16avo(5) || { nombre: 'Ganador Llave 6 (Match 78)' }, desc: 'Match 91 (8vo 3)' },
                { t1: getWinner16avo(6) || { nombre: 'Ganador Llave 7 (Match 79)' }, t2: getWinner16avo(7) || { fontItalic: true, nombre: 'Ganador Llave 8 (Match 80)' }, desc: 'Match 92 (8vo 4)' },
                { t1: getWinner16avo(10) || { nombre: 'Ganador Llave 11 (Match 83)' }, t2: getWinner16avo(11) || { nombre: 'Ganador Llave 12 (Match 84)' }, desc: 'Match 93 (8vo 5)' },
                { t1: getWinner16avo(8) || { nombre: 'Ganador Llave 9 (Match 81)' }, t2: getWinner16avo(9) || { nombre: 'Ganador Llave 10 (Match 82)' }, desc: 'Match 94 (8vo 6)' },
                { t1: getWinner16avo(13) || { nombre: 'Ganador Llave 14 (Match 86)' }, t2: getWinner16avo(15) || { nombre: 'Ganador Llave 16 (Match 88)' }, desc: 'Match 95 (8vo 7)' },
                { t1: getWinner16avo(12) || { nombre: 'Ganador Llave 13 (Match 85)' }, t2: getWinner16avo(14) || { nombre: 'Ganador Llave 15 (Match 87)' }, desc: 'Match 96 (8vo 8)' }
            ];

            for (let idx = 0; idx < octavos.length; idx++) {
                const o = octavos[idx];
                const ganadorSelected = ganadores8vos[idx];
                if (ganadorSelected && (!o.t1.id || ganadorSelected !== o.t1.id) && (!o.t2.id || ganadorSelected !== o.t2.id)) {
                    delete ganadores8vos[idx];
                }
            }

            if (subTabActivo === '16avos') {
                llaves.forEach((llave, idx) => {
                    const styleT1 = llave.t1.id ? 'text-gray-800 font-bold hover:bg-blue-100/70 cursor-pointer' : 'text-gray-400 italic';
                    const styleT2 = llave.t2.id ? 'text-gray-800 font-bold hover:bg-blue-100/70 cursor-pointer' : 'text-gray-400 italic';
                    
                    const ganadorSelected = ganadores16avos[idx];
                    const borderClass = ganadorSelected ? 'border-green-300 bg-green-50/20' : 'border-gray-200 bg-gray-50/40';
                    
                    const winStyleT1 = ganadorSelected === llave.t1.id ? 'bg-green-600 text-white rounded px-1.5 py-0.5' : '';
                    const winStyleT2 = ganadorSelected === llave.t2.id ? 'bg-green-600 text-white rounded px-1.5 py-0.5' : '';
                    
                    const actionT1 = llave.t1.id ? `onclick="elegirGanador16avo(${idx}, '${llave.t1.id}')"` : '';
                    const actionT2 = llave.t2.id ? `onclick="elegirGanador16avo(${idx}, '${llave.t2.id}')"` : '';

                    let badgeT1 = '';
                    if (llave.t1.id) {
                        let text = llave.t1Label;
                        if (text === '3º' && llave.t1.grupo) text = `3º ${llave.t1.grupo}`;
                        badgeT1 = `<span class="bg-blue-100/60 text-blue-800 text-[9px] px-1 py-0.5 rounded font-medium select-none ml-1">${text}</span>`;
                    }
                    let badgeT2 = '';
                    if (llave.t2.id) {
                        let text = llave.t2Label;
                        if (text === '3º' && llave.t2.grupo) text = `3º ${llave.t2.grupo}`;
                        badgeT2 = `<span class="bg-blue-100/60 text-blue-800 text-[9px] px-1 py-0.5 rounded font-medium select-none mr-1">${text}</span>`;
                    }

                    cont.innerHTML += `
                        <div class="border rounded-lg p-2.5 mb-1.5 shadow-sm transition-all duration-200 ${borderClass}">
                            <div class="flex justify-between items-center text-[9px] text-gray-500 font-bold uppercase tracking-wider mb-1">
                                <span>${llave.desc}</span>
                                ${ganadorSelected ? '<span class="text-green-600 font-extrabold flex items-center gap-0.5">✓ Clasificado</span>' : (llave.t1.id && llave.t2.id ? '<span class="text-blue-500 font-semibold opacity-75">Toca un equipo para clasificarlo</span>' : '<span class="text-gray-400 font-semibold opacity-75">Esperando definición de grupos</span>')}
                            </div>
                            <div class="flex justify-between items-center text-xs">
                                <div ${actionT1} class="flex-1 p-1.5 rounded transition-all duration-150 ${styleT1} flex items-center justify-start gap-1">
                                    <span class="${winStyleT1}">${llave.t1.nombre}</span> ${badgeT1}
                                </div>
                                <div class="px-3 text-gray-400 font-bold text-[10px] select-none">VS</div>
                                <div ${actionT2} class="flex-1 p-1.5 rounded transition-all duration-150 text-right ${styleT2} flex items-center justify-end gap-1">
                                    ${badgeT2} <span class="${winStyleT2}">${llave.t2.nombre}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                octavos.forEach((llave, idx) => {
                    const styleT1 = llave.t1.id ? 'text-gray-800 font-bold hover:bg-blue-100/70 cursor-pointer' : 'text-gray-400 italic';
                    const styleT2 = llave.t2.id ? 'text-gray-800 font-bold hover:bg-blue-100/70 cursor-pointer' : 'text-gray-400 italic';
                    
                    const ganadorSelected = ganadores8vos[idx];
                    const borderClass = ganadorSelected ? 'border-green-300 bg-green-50/20' : 'border-gray-200 bg-gray-50/40';
                    
                    const winStyleT1 = ganadorSelected === llave.t1.id ? 'bg-green-600 text-white rounded px-1.5 py-0.5' : '';
                    const winStyleT2 = ganadorSelected === llave.t2.id ? 'bg-green-600 text-white rounded px-1.5 py-0.5' : '';
                    
                    const actionT1 = llave.t1.id ? `onclick="elegirGanador8vo(${idx}, '${llave.t1.id}')"` : '';
                    const actionT2 = llave.t2.id ? `onclick="elegirGanador8vo(${idx}, '${llave.t2.id}')"` : '';

                    cont.innerHTML += `
                        <div class="border rounded-lg p-2.5 mb-1.5 shadow-sm transition-all duration-200 ${borderClass}">
                            <div class="flex justify-between items-center text-[9px] text-gray-500 font-bold uppercase tracking-wider mb-1">
                                <span>${llave.desc}</span>
                                ${ganadorSelected ? '<span class="text-green-600 font-extrabold flex items-center gap-0.5">✓ Ganador</span>' : (llave.t1.id && llave.t2.id ? '<span class="text-blue-500 font-semibold opacity-75">Toca un equipo para clasificarlo</span>' : '<span class="text-gray-400 font-semibold opacity-75">Esperando clasificados de 16avos</span>')}
                            </div>
                            <div class="flex justify-between items-center text-xs">
                                <div ${actionT1} class="flex-1 p-1.5 rounded transition-all duration-150 ${styleT1} flex items-center justify-start gap-1">
                                    <span class="${winStyleT1}">${llave.t1.nombre}</span>
                                </div>
                                <div class="px-3 text-gray-400 font-bold text-[10px] select-none">VS</div>
                                <div ${actionT2} class="flex-1 p-1.5 rounded transition-all duration-150 text-right ${styleT2} flex items-center justify-end gap-1">
                                    <span class="${winStyleT2}">${llave.t2.nombre}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
        }

        // --- NAVEGACIÓN TABS ---
        function cambiarTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => {
                el.classList.remove('btn-active');
                el.classList.add('text-gray-500');
            });
            document.getElementById(`content-${tabName}`).classList.add('active');
            let btn = document.getElementById(`tab-${tabName}`);
            btn.classList.add('btn-active');
            btn.classList.remove('text-gray-500');
        }

        function showToast(message, type = 'info') {
            const existingToast = document.getElementById('toast-notification');
            if (existingToast) {
                existingToast.remove();
            }

            const toast = document.createElement('div');
            toast.id = 'toast-notification';
            toast.className = `fixed bottom-20 left-1/2 transform -translate-x-1/2 px-4 py-2.5 rounded-lg text-xs font-semibold shadow-lg z-50 flex items-center gap-2 border transition-all duration-300 ${type === 'success'
                    ? 'bg-green-50 border-green-200 text-green-800'
                    : type === 'warning'
                        ? 'bg-yellow-50 border-yellow-200 text-yellow-800'
                        : 'bg-blue-50 border-blue-200 text-blue-800'
                }`;

            let icon = '';
            if (type === 'success') {
                icon = `<svg class="w-4 h-4 text-green-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            } else if (type === 'warning') {
                icon = `<svg class="w-4 h-4 text-yellow-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            } else {
                icon = `<svg class="w-4 h-4 text-blue-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }

            toast.innerHTML = `${icon} <span>${message}</span>`;
            document.body.appendChild(toast);

            toast.style.opacity = '0';
            toast.style.transform = 'translate(-50%, 10px)';
            toast.offsetHeight; // force reflow
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 10px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function irAPartidosDeHoy() {
            cambiarTab('fixture');

            const mesesCompletos = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
            const hoyObj = new Date();
            const dia = hoyObj.getDate();
            const mes = mesesCompletos[hoyObj.getMonth()];
            const hoyString = `${dia} ${mes}`;

            const elementos = document.querySelectorAll('[data-fecha]');
            let targetElement = null;

            // 1. Intentar buscar el primer partido de hoy
            for (let el of elementos) {
                if (el.getAttribute('data-fecha') === hoyString) {
                    targetElement = el;
                    break;
                }
            }

            if (targetElement) {
                targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                showToast(`Posicionado en los partidos de hoy (${hoyString})`, 'success');

                // Resaltar los partidos de hoy
                const partidosHoy = document.querySelectorAll(`[data-fecha="${hoyString}"]`);
                partidosHoy.forEach(el => {
                    el.classList.add('ring-2', 'ring-blue-500', 'scale-[1.01]');
                    setTimeout(() => {
                        el.classList.remove('ring-2', 'ring-blue-500', 'scale-[1.01]');
                    }, 2500);
                });
            } else {
                // Fallback: buscar el primer partido pendiente sin goles definidos
                const primerPendiente = fixture.find(p => p.g1 === null && p.g2 === null);
                if (primerPendiente) {
                    targetElement = document.querySelector(`[data-id="${primerPendiente.id}"]`);
                }

                // Segundo fallback: primer partido
                if (!targetElement && elementos.length > 0) {
                    targetElement = elementos[0];
                }

                if (targetElement) {
                    targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    const fechaElemento = targetElement.getAttribute('data-fecha');
                    showToast(`No hay partidos hoy (${hoyString}). Mostrando partidos del ${fechaElemento}.`, 'info');

                    const partidosFecha = document.querySelectorAll(`[data-fecha="${fechaElemento}"]`);
                    partidosFecha.forEach(el => {
                        el.classList.add('ring-2', 'ring-blue-500', 'scale-[1.01]');
                        setTimeout(() => {
                            el.classList.remove('ring-2', 'ring-blue-500', 'scale-[1.01]');
                        }, 2500);
                    });
                } else {
                    showToast(`No se encontraron partidos.`, 'warning');
                }
            }
        }

        window.onload = inicializarDatos;
    </script>

    <!-- Botón flotante para hoy -->
    <div class="fixed bottom-4 right-4 z-50">
        <button onclick="irAPartidosDeHoy()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-full shadow-lg hover:shadow-xl transition-all duration-300 transform hover:scale-105 flex items-center gap-1.5 font-semibold text-xs border border-blue-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            Partidos de Hoy
        </button>
    </div>
</body>
